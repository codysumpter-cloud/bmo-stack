name: BMO Issue to PR

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to process
        required: true
        type: string
      dry_run:
        description: Only generate the plan comment
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: bmo-issue-to-pr-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'autonomy:ready'
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.issue.outputs.issue_number }}
      executor_allowed: ${{ steps.plan.outputs.executor_allowed }}
      branch_name: ${{ steps.plan.outputs.branch_name }}
      dry_run: ${{ steps.flags.outputs.dry_run }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve dry run mode
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate autonomy plan
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .github/autonomy
          bash scripts/github-issue-planner.sh \
            "${{ github.repository }}" \
            "${{ steps.issue.outputs.issue_number }}" \
            > .github/autonomy/plan.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          plan = json.loads(Path('.github/autonomy/plan.json').read_text(encoding='utf-8'))
          print(f"executor_allowed={'true' if plan['executor_allowed'] else 'false'}")
          print(f"branch_name={plan['branch_name']}")
          PY

      - name: Write issue plan summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY' > .github/autonomy/plan-comment.md
          import json
          from pathlib import Path
          plan = json.loads(Path('.github/autonomy/plan.json').read_text(encoding='utf-8'))
          print('## BMO autonomy plan')
          print('')
          print(f"- Issue: #{plan['issue_number']}")
          print(f"- Scope: `{plan['scope']}`")
          print(f"- Risk: `{plan['risk']}`")
          print(f"- Executor allowed: `{str(plan['executor_allowed']).lower()}`")
          print(f"- Proposed branch: `{plan['branch_name']}`")
          print('')
          print('### Suggested targets')
          for item in plan['suggested_targets']:
              print(f"- `{item}`")
          print('')
          print('### Checks to run')
          for item in plan['checks']:
              print(f"- `{item}`")
          print('')
          print(f"Plan generated by workflow run `{plan['run_id']}`.")
          PY
          gh issue comment "${{ steps.issue.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file .github/autonomy/plan-comment.md

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: bmo-autonomy-plan-${{ steps.issue.outputs.issue_number }}
          path: .github/autonomy/plan.json

  autonomy:
    needs: plan
    if: |
      needs.plan.outputs.dry_run != 'true' &&
      needs.plan.outputs.executor_allowed == 'true' &&
      vars.BMO_AUTONOMY_EXECUTION_ENABLED == 'true'
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: bmo-autonomy-plan-${{ needs.plan.outputs.issue_number }}
          path: .github/autonomy

      - name: Ensure GitHub CLI is available
        run: gh --version

      - name: Create autonomy branch
        run: |
          git switch -c "${{ needs.plan.outputs.branch_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run executor
        env:
          BMO_GITHUB_AUTONOMY_EXECUTOR: ${{ vars.BMO_GITHUB_AUTONOMY_EXECUTOR }}
        run: |
          bash scripts/github-change-executor.sh .github/autonomy/plan.json

      - name: Run verifier
        run: |
          bash scripts/github-neptr-verify.sh .github/autonomy/plan.json > .github/autonomy/verify.json

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes were produced by the executor."
            exit 0
          fi
          git add .
          git commit -m "autonomy: apply issue #${{ needs.plan.outputs.issue_number }}"
          git push --set-upstream origin "${{ needs.plan.outputs.branch_name }}"

      - name: Open draft pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff origin/${{ github.event.repository.default_branch }}...HEAD --quiet; then
            echo "No diff to open as PR."
            exit 0
          fi
          python3 - <<'PY' > .github/autonomy/pr-body.md
          import json
          from pathlib import Path
          plan = json.loads(Path('.github/autonomy/plan.json').read_text(encoding='utf-8'))
          verify = json.loads(Path('.github/autonomy/verify.json').read_text(encoding='utf-8'))
          print('## Summary')
          print(plan['summary'])
          print('')
          print(f"Closes #{plan['issue_number']}")
          print('')
          print('## Risk')
          print(f"- {plan['risk']}")
          print('')
          print('## Verification')
          for item in verify['checks']:
              print(f"- {item['name']}: {item['status']}")
          print('')
          print('## Rollback')
          print('- Revert this PR or disable the triggering label before rerun.')
          PY
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ needs.plan.outputs.branch_name }}" \
            --title "autonomy: address issue #${{ needs.plan.outputs.issue_number }}" \
            --body-file .github/autonomy/pr-body.md \
            --draft
