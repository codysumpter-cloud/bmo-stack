name: skills-validation

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.py'
      - '.github/workflows/skills.yml'
  push:
    branches:
      - master
    paths:
      - 'skills/**'
      - 'scripts/validate-skills.py'
      - '.github/workflows/skills.yml'

permissions:
  contents: read

jobs:
  validate-skills-registry:
    name: validate-skills-registry
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate skills registry
        run: python3 scripts/validate-skills.py
