name: autonomy-foundation-smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify toolchain
        run: jq --version

      - name: Seed memory fixture
        run: |
          python3 - <<'PY'
          import json
          import time
          from pathlib import Path

          data = {
              "history": [
                  {
                      "input": "ci failed",
                      "skill": "ci-failure-diagnosis",
                      "action": "show",
                      "success": True,
                      "ts": int(time.time()) - 60,
                  }
              ]
          }

          Path("skills/memory.json").write_text(
              json.dumps(data, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run goal planner
        run: python3 scripts/skill_goal_plan.py --goal "improve system reliability" --output smoke-plan.json

      - name: Execute planned evolution
        run: bash scripts/skill_execute_plan.sh workflows/smoke-plan.json

      - name: Reflect
        run: python3 scripts/skill_reflect.py --output workflows/smoke-reflection.json

      - name: Score skills
        run: python3 scripts/skill_confidence.py --output workflows/smoke-scorecard.json

      - name: Assert scorecard schema
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          scorecard = json.loads(Path("workflows/smoke-scorecard.json").read_text(encoding="utf-8"))
          assert scorecard["score_model"] == "beta-prior-v1"
          assert isinstance(scorecard["skills"], dict)
          assert "ci-failure-diagnosis" in scorecard["skills"]

          sample = scorecard["skills"]["ci-failure-diagnosis"]
          required = {
              "attempts",
              "successes",
              "failures",
              "success_rate",
              "posterior_confidence",
              "recency_weight",
              "disabled",
              "decayed",
              "final_score",
          }
          missing = required - set(sample)
          assert not missing, f"missing fields: {sorted(missing)}"
          PY

      - name: Run diagnosis script
        run: python3 scripts/skills_access_diagnosis.py > workflows/skills-diagnosis.json

      - name: Assert diagnosis schema
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("workflows/skills-diagnosis.json").read_text(encoding="utf-8"))
          assert isinstance(report["skill_search_order"], list)
          assert len(report["skill_search_order"] ) == 3
          assert "manual_install_targets" in report
          assert "preferred_default" in report["manual_install_targets"]
          assert "workspace_override" in report["manual_install_targets"]
          PY

      - name: Apply BMO runtime profile
        run: python3 scripts/apply-bmo-runtime-profile.py dev --env-file workflows/test-bmo-runtime.env --output workflows/bmo-runtime-profile.json

      - name: Assert BMO runtime profile schema
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          profile = json.loads(Path("workflows/bmo-runtime-profile.json").read_text(encoding="utf-8"))
          assert profile["profile"] == "dev"
          assert profile["values"]["BMO_TEXT_MODEL"]
          assert profile["values"]["BMO_VISION_MODEL"]
          assert profile["values"]["BMO_TTS_MODE"]
          PY

      - name: Assert generated runtime env is sourceable
        run: |
          set -a
          . workflows/test-bmo-runtime.env
          set +a
          test "$BMO_SYSTEM_PROMPT_EXTRAS" = "Keep responses concise, practical, and BMO-like."

      - name: Render BMO idle face
        run: bash scripts/bmo-face.sh idle

      - name: Run BMO runtime doctor
        run: BMO_RUNTIME_ENV_FILE=workflows/test-bmo-runtime.env bash scripts/bmo-runtime-doctor.sh

      - name: Replan loop
        run: bash scripts/skill_replan.sh
