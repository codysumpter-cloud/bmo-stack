name: BeMoreAgent iOS validation

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: bemoreagent-ios-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Generate and build BeMoreAgent
    runs-on: ${{ fromJSON(vars.BEMOREAGENT_IOS_RUNS_ON != '' && vars.BEMOREAGENT_IOS_RUNS_ON || '["self-hosted","macOS"]') }}
    defaults:
      run:
        working-directory: apps/openclaw-shell-ios
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen if needed
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Show app version and build
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' OpenClawShell/Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' OpenClawShell/Info.plist)
          echo "Building BeMoreAgent $VERSION ($BUILD)"

      - name: Generate project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project BeMoreAgent.xcodeproj \
            -scheme BeMoreAgent \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/DerivedData \
            build

      - name: Publish validation summary
        if: always()
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' OpenClawShell/Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' OpenClawShell/Info.plist)
          {
            echo '## BeMoreAgent iOS validation'
            echo ''
            echo "- Version: $VERSION ($BUILD)"
            echo '- Project generated from apps/openclaw-shell-ios/project.yml'
            echo '- Destination: generic/platform=iOS Simulator'
          } >> "$GITHUB_STEP_SUMMARY"
