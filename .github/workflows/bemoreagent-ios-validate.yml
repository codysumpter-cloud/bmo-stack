name: BeMoreAgent iOS validation

on:
  pull_request:
    paths:
      - 'apps/openclaw-shell-ios/**'
      - '.github/workflows/bemoreagent-ios-validate.yml'
  push:
    branches:
      - master
    paths:
      - 'apps/openclaw-shell-ios/**'
      - '.github/workflows/bemoreagent-ios-validate.yml'
  workflow_dispatch:

concurrency:
  group: bemoreagent-ios-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Generate and build BeMoreAgent
    runs-on: ${{ fromJSON(vars.BEMOREAGENT_IOS_RUNS_ON != '' && vars.BEMOREAGENT_IOS_RUNS_ON || '["self-hosted","macOS"]') }}
    defaults:
      run:
        working-directory: apps/openclaw-shell-ios
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen if needed
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project BeMoreAgent.xcodeproj \
            -scheme BeMoreAgent \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/DerivedData \
            build
