name: BeMoreAgent iOS validation

on:
  pull_request:
    paths:
      - 'apps/openclaw-shell-ios/**'
      - '.github/workflows/bemoreagent-ios-validate.yml'
  push:
    branches:
      - master
    paths:
      - 'apps/openclaw-shell-ios/**'
      - '.github/workflows/bemoreagent-ios-validate.yml'

jobs:
  build-ios:
    name: Generate and build BeMoreAgent
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/openclaw-shell-ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project BeMoreAgent.xcodeproj \
            -scheme BeMoreAgent \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/DerivedData \
            build
