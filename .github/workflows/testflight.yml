name: Build & TestFlight

on:
  push:
    branches: [master]
    paths:
      - 'apps/openclaw-shell-ios/**'
      - '.github/workflows/testflight.yml'
  workflow_dispatch:

concurrency:
  group: bemoreagent-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ fromJSON(vars.BEMOREAGENT_IOS_RUNS_ON != '' && vars.BEMOREAGENT_IOS_RUNS_ON || '["self-hosted","macOS"]') }}
    defaults:
      run:
        working-directory: apps/openclaw-shell-ios
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen if needed
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: |
          test -f project.yml
          xcodegen generate
          test -d BeMoreAgent.xcodeproj
          test -f exportOptions-upload.plist

      - name: Build and archive
        run: |
          xcodebuild -project BeMoreAgent.xcodeproj \
            -scheme BeMoreAgent \
            -configuration Release \
            -archivePath "$GITHUB_WORKSPACE/apps/openclaw-shell-ios/BeMoreAgent.xcarchive" \
            clean archive \
            -allowProvisioningUpdates

      - name: Write App Store Connect API key
        env:
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          test -n "$APPSTORE_CONNECT_API_KEY"
          umask 077
          printf '%s' "$APPSTORE_CONNECT_API_KEY" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Export and upload to TestFlight
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          test -n "$APPSTORE_CONNECT_KEY_ID"
          test -n "$APPSTORE_CONNECT_ISSUER_ID"
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/apps/openclaw-shell-ios/BeMoreAgent.xcarchive" \
            -exportPath "$GITHUB_WORKSPACE/apps/openclaw-shell-ios/export" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/apps/openclaw-shell-ios/exportOptions-upload.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$APPSTORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_CONNECT_ISSUER_ID"

      - name: Clean temporary signing files
        if: always()
        run: rm -f "$RUNNER_TEMP/AuthKey.p8"
