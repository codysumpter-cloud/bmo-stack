name: autonomous-skill-evolution

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run evolution
        run: python3 scripts/skill_autonomy.py --generate-skill --stats

      - name: Validate registry
        run: python3 scripts/validate-skills.py

      - name: Confidence gate
        run: python3 scripts/skill_confidence.py

      - name: Skill health (auto-disable bad)
        run: python3 scripts/skill_health.py

      - name: Skill decay (prune unused)
        run: python3 scripts/skill_decay.py

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "auto: guarded evolution"
          branch: auto/guarded-evolution
          title: "Auto: guarded evolution"
          body: "Validated + confidence-gated + self-protected evolution"