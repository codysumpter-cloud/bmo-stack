name: autonomous-skill-evolution

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

- name: Build dynamic plan
  run: python3 scripts/skill_plan.py --goal "improve system reliability"

- name: Execute dynamic plan
  run: ./scripts/skill_execute_plan.sh workflows/dynamic-plan.json

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: autonomous skill evolution"
          branch: auto/skill-evolution
          title: "Auto: skill evolution update"
          body: "Automated evolution from memory"
