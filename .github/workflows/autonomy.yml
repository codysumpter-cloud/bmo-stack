name: autonomous-skill-evolution

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run autonomy loop
        run: |
          python3 scripts/skill_autonomy.py --generate-skill --stats

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: autonomous evolution"
          branch: auto/skills
          title: "Auto: evolving skills"
          body: "Autonomous improvements"

  auto-merge:
    needs: evolve
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Auto merge PRs
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: ""
          MERGE_METHOD: "squash"
