name: autonomous-skill-evolution

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build dynamic plan
        run: python3 scripts/skill_plan.py --goal "improve system reliability"

      - name: Execute dynamic plan
        run: ./scripts/skill_execute_plan.sh workflows/dynamic-plan.json

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "auto: guarded evolution"
          branch: auto/guarded-evolution
          title: "Auto: guarded evolution"
          body: "Validated + confidence-gated + self-protected evolution"
