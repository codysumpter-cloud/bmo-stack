name: autonomous-goal-loop

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build goal-driven plan
        run: python3 scripts/skill_goal_plan.py --goal "improve system reliability"

      - name: Execute plan
        run: bash scripts/skill_execute_plan.sh workflows/dynamic-plan.json

      - name: Reflect + replan
        run: bash scripts/skill_replan.sh

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "auto: goal-loop evolution"
          branch: auto/goal-loop
          title: "Auto: goal-loop evolution"
          body: "Dynamic planning + reflection loop + safe evolution"
