name: Bug report
description: Report a broken behavior in bootstrap, worker setup, gateway routing, CI, or repo automation.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include enough detail for someone else to reproduce it without mind-reading.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where is the problem happening?
      options:
        - bootstrap / install
        - OpenClaw main / worker split
        - sandbox / Docker / OpenShell
        - Telegram / channel routing
        - context / council files
        - GitHub Actions / automation
        - documentation
        - other
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command or action that triggered the issue
      placeholder: "make worker-ready"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: Tell us what you expected and what happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce this.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or terminal output
      description: Paste the most useful snippet, not a novel.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Docker, OpenClaw, and anything else relevant.
      placeholder: |
        - OS:
        - Docker version:
        - OpenClaw version:
        - Repo branch / commit:

  - type: checkboxes
    id: checks
    attributes:
      label: Quick checks
      options:
        - label: I checked for an existing issue first.
          required: true
        - label: I removed or redacted secrets from logs and screenshots.
          required: true
